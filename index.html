    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: "SamsungSS", sans-serif;
      background: #f0f4f8;
      display: flex;
      height: 100vh;
    }

    /* -- SIDEBAR -- */
    #sidebar {
      width: 280px; min-width: 280px;
      background: #003057;
      display: flex; flex-direction: column;
      transition: width 0.3s ease, min-width 0.3s ease;
      overflow: hidden;
      position: relative; z-index: 10;
      box-shadow: 2px 0 12px rgba(0,0,0,0.25);
    }
    #sidebar.collapsed { width: 56px; min-width: 56px; }

    #sidebar-logo {
      padding: 20px 16px 16px 16px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      min-height: 72px;
    }
    #sidebar-logo img {
      height: 20px; width: auto;
      filter: brightness(0) invert(1);
      transition: opacity 0.25s;
    }
    #sidebar.collapsed #sidebar-logo img { opacity: 0; }

    #nav-items { flex: 1; padding: 8px 0; overflow-y: auto; overflow-x: hidden; }
    #nav-items::-webkit-scrollbar { width: 3px; }
    #nav-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }

    /* Main nav item */
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      cursor: pointer;
      color: rgba(255,255,255,0.65);
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      white-space: nowrap;
      font-size: 0.82rem; font-weight: 400;
      font-family: "SamsungSSHead", sans-serif;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.08); color: white; }
    .nav-item.active {
      background: rgba(20,40,160,0.45);
      border-left-color: #1428A0;
      color: white; font-weight: 700;
    }

    .nav-icon {
      width: 20px; height: 20px; flex-shrink: 0;
      stroke: currentColor; fill: none;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      transition: transform 0.2s;
    }
    .nav-label { transition: opacity 0.2s; overflow: hidden; flex: 1; }
    #sidebar.collapsed .nav-label { opacity: 0; width: 0; pointer-events: none; }

    /* Chevron arrow for expandable items */
    .nav-arrow {
      width: 14px; height: 14px; flex-shrink: 0;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      transition: transform 0.25s, opacity 0.2s;
      opacity: 0.6;
    }
    .nav-group.open .nav-arrow { transform: rotate(90deg); }
    #sidebar.collapsed .nav-arrow { opacity: 0; width: 0; overflow: hidden; }

    /* Sub-items container */
    .sub-items {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0,0,0,0.15);
    }
    .nav-group.open .sub-items { max-height: 300px; }
    #sidebar.collapsed .sub-items { max-height: 0 !important; }

    .sub-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 16px 9px 46px;
      cursor: pointer;
      color: rgba(255,255,255,0.5);
      font-size: 0.78rem; font-weight: 400;
      font-family: "SamsungSSHead", sans-serif;
      white-space: nowrap;
      transition: all 0.15s ease;
      border-left: 3px solid transparent;
    }
    .sub-item:hover { color: rgba(255,255,255,0.85); background: rgba(255,255,255,0.05); }
    .sub-item.active {
      color: white; font-weight: 600;
      border-left-color: rgba(20,40,160,0.7);
      background: rgba(20,40,160,0.25);
    }
    .sub-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: currentColor; flex-shrink: 0; opacity: 0.6;
    }
    .sub-item.active .sub-dot { opacity: 1; background: #4a6cf7; }

    /* Toggle button */
    #toggle-btn {
      margin: 8px auto 16px auto;
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.1);
      border: none; border-radius: 50%;
      cursor: pointer; color: #ffffff;
      transition: background 0.2s, transform 0.3s;
      flex-shrink: 0;
    }
    #toggle-btn:hover { background: rgba(255,255,255,0.2); color: white; }
    #sidebar.collapsed #toggle-btn { transform: rotate(180deg); }

    /* -- MAIN CONTENT -- */
    #main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

    .section-frame {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: none; display: none;
    }
    .section-frame.active { display: block; }
  </style>

        // -----------------------------------------------------------------
        const WORKER_URL = &quot;https://roadmap-asp-proxy.baptiste-araujo-pro.workers.dev&quot;;

        // Clé de cache localStorage pour un variant donné
        function cacheKey(productName, variant) {
            return `asp__${productName}__${variant.ram}__${variant.rom}`.replace(/\s+/g, '_');
        }

        async function fetchASPFromClaude(productName, variant) {
            // 1. Vérifier le cache (valide 30 jours)
            try {
                const raw = localStorage.getItem(cacheKey(productName, variant));
                if (raw) {
                    const { result, ts } = JSON.parse(raw);
                    if (Date.now() - ts < 30 * 24 * 60 * 60 * 1000) {
                        return { result, fromCache: true };
                    }
                }
            } catch(_) {}

            // 2. Appel API — prompt court + modèle Haiku (80% moins cher)
            const response = await fetch(WORKER_URL, {
                method: &quot;POST&quot;,
                headers: { &quot;Content-Type&quot;: &quot;application/json&quot; },
                body: JSON.stringify({
                    model: &quot;claude-haiku-4-5-20251001&quot;,
                    max_tokens: 500,
                    system: &quot;Tu es un assistant spécialisé en prix de smartphones. Réponds UNIQUEMENT avec le prix ASP estimé, format court (ex: \&quot;~1 200 €\&quot; ou \&quot;1 100 € – 1 300 €\&quot;). Aucune phrase, aucune explication.&quot;,
                    tools: [{ type: &quot;web_search_20250305&quot;, name: &quot;web_search&quot; }],
                    messages: [{
                        role: &quot;user&quot;,
                        content: `Prix ASP moyen en France pour &quot;${productName}&quot; ${variant.ram}/${variant.rom} en 2025.`
                    }]
                })
            });

            if (!response.ok) {
                const err = await response.json().catch(() => ({}));
                throw new Error(err?.error?.message || `Erreur HTTP ${response.status}`);
            }

            const data = await response.json();

            // 3. Prendre le DERNIER bloc texte (après la recherche web)
            //    Le modèle peut envoyer plusieurs blocs : intro → tool_use → tool_result → réponse finale
            const textBlocks = (data.content || []).filter(b => b.type === &quot;text&quot; &amp;&amp; b.text &amp;&amp; b.text.trim());
            if (textBlocks.length === 0) throw new Error(&quot;Réponse vide de l'IA&quot;);
            const result = textBlocks[textBlocks.length - 1].text.trim();

            // 4. Mettre en cache
            try {
                localStorage.setItem(cacheKey(productName, variant), JSON.stringify({ result, ts: Date.now() }));
            } catch(_) {}

            return { result, fromCache: false };
        }

                                    {(product.colors || []).map((color, cIdx) => (

                                            <input type=&quot;color&quot; className=&quot;w-8 h-8 rounded border border-gray-200 flex-shrink-0&quot; value={color.hex || '#000000'} onChange={e => updateColor(pIdx, cIdx, 'hex', e.target.value)} />
                                            <input className={`${inputCls} bg-white`} value={color.name || ''} onChange={e => updateColor(pIdx, cIdx, 'name', e.target.value)} placeholder=&quot;Nom couleur&quot; />
                                            <input className={`${inputCls} bg-white font-mono text-xs w-24 flex-shrink-0`} value={color.hex || ''} onChange={e => updateColor(pIdx, cIdx, 'hex', e.target.value)} />
                                            <button onClick={() => removeColor(pIdx, cIdx)} className=&quot;p-1.5 text-gray-400 hover:text-red-500 transition-colors flex-shrink-0&quot;><X className=&quot;w-4 h-4&quot; /></button>
                                        </div>

                                </div>
                            </div>

                            {/* Variantes */}
                            <div>

                                    <label className={labelCls + ' mb-0'}>Variantes ({(product.variants || []).length}/4)</label>
                                    {(product.variants || []).length < 4 &amp;&amp; (
                                        <button onClick={() => addVariant(pIdx)} className=&quot;inline-flex items-center gap-1 text-xs text-blue-600 hover:text-blue-800 font-medium&quot;>
                                            <Plus className=&quot;w-3 h-3&quot; />Ajouter une variante
                                        </button>

                                </div>
                                <div className=&quot;space-y-2&quot;>
                                    {(product.variants || []).map((variant, vIdx) => (
                                        <div key={vIdx} className=&quot;grid grid-cols-[1fr_1fr_1fr_auto] gap-2 items-center&quot;>
                                            <input className={inputCls} value={variant.ram || ''} onChange={e => updateVariant(pIdx, vIdx, 'ram', e.target.value)} placeholder=&quot;RAM (ex: 12 Go)&quot; />
                                            <input className={inputCls} value={variant.rom || ''} onChange={e => updateVariant(pIdx, vIdx, 'rom', e.target.value)} placeholder=&quot;Stockage (ex: 256 Go)&quot; />
                                            <input type=&quot;number&quot; className={inputCls} value={variant.rrp ?? 0} onChange={e => updateVariant(pIdx, vIdx, 'rrp', e.target.value)} placeholder=&quot;RRP (€)&quot; />
                                            <button onClick={() => removeVariant(pIdx, vIdx)} className=&quot;p-1.5 text-gray-400 hover:text-red-500 transition-colors&quot;><X className=&quot;w-4 h-4&quot; /></button>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    ))}

                    <button onClick={addProduct} className=&quot;w-full flex items-center justify-center gap-2 py-3 border-2 border-dashed border-gray-200 rounded-2xl text-gray-500 hover:text-blue-600 hover:border-blue-300 transition-colors font-medium text-sm&quot;>
                        <Plus className=&quot;w-4 h-4&quot; />Ajouter un produit
                    </button>
                </div>
            );
        }
        function App() {
            const [activeCategory, setActiveCategory] = useState('smartphones');
            React.useEffect(() => { window.__rpNav = setActiveCategory; }, []);
            const [activeYear, setActiveYear]         = useState(2026);
            const [selectedProduct, setSelectedProduct] = useState(null);

            // ─── Mode Edition (admin) ───
            const [data, setData] = useState(() => {
                try {
                    const saved = localStorage.getItem('roadmapGPEditData');
                    if (saved) return JSON.parse(saved);
                } catch (_) {}
                return JSON.parse(JSON.stringify(mockData));
            });
            React.useEffect(() => {
                try { localStorage.setItem('roadmapGPEditData', JSON.stringify(data)); } catch (_) {}
            }, [data]);

            const [editMode, setEditMode]             = useState(false);
            const [showAdminInput, setShowAdminInput] = useState(false);
            const [adminPassword, setAdminPassword]   = useState('');
            const [adminError, setAdminError]         = useState(false);
            const [editorView, setEditorView]         = useState(false);

            const handleAdminUnlock = () => {
                if (adminPassword === 'admin') {
                    setEditMode(true); setShowAdminInput(false);
                    setAdminError(false); setAdminPassword('');
                } else { setAdminError(true); }
            };

            const handleAdminLock = () => {
                setEditMode(false); setEditorView(false);
                setShowAdminInput(false); setAdminPassword(''); setAdminError(false);
            };

            const handleResetData = () => {
                if (!window.confirm(&quot;Reinitialiser toutes les modifications et revenir aux donnees d'origine ?&quot;)) return;
                setData(JSON.parse(JSON.stringify(mockData)));
            };

            const handleExportData = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'roadmap-gp-data.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            // Filtres par gamme (uniquement pertinents pour Smartphones et Tablettes)
            const rangeFilters = [
                { id: 'sz',      label: 'Gamme S/Z',     match: ['S', 'Z'], min: 500, max: 2500, steps: [500, 1000, 1500, 2000, 2500] },
                { id: 'a',       label: 'Gamme A',       match: ['A'],      min: 0,   max: 900,  steps: [0, 300, 600, 900] },
                { id: 'durcie',  label: 'Gamme Durcie',  match: ['Durcie'], min: 0,   max: 1500, steps: [0, 500, 1000, 1500] },
            ];
            const showRangeFilter = activeCategory === 'smartphones' || activeCategory === 'tablets';
            const [activeRange, setActiveRange] = useState('sz');
            const currentRangeFilter = showRangeFilter ? (rangeFilters.find(r => r.id === activeRange) || rangeFilters[0]) : null;

            const baseData = data[activeCategory]?.[activeYear] || [];
            const currentData = (currentRangeFilter
                ? baseData.filter(p => currentRangeFilter.match.includes(p.range))
                : baseData
            ).slice().sort((a, b) => a.basePrice - b.basePrice);

            const minPrice    = currentRangeFilter ? currentRangeFilter.min : 0;
            const maxPrice    = currentRangeFilter ? currentRangeFilter.max : 2500;
            const priceSteps  = currentRangeFilter ? currentRangeFilter.steps : [0, 500, 1000, 1500, 2000, 2500];
            const priceSpan   = (maxPrice - minPrice) || 1;

            // Attribution de &quot;lanes&quot; verticales pour éviter que les barres ne se
            // superposent lorsque leurs périodes se chevauchent et que leurs prix
            // sont trop proches (ce qui empêchait de cliquer dessus correctement).
            const positionedData = (() => {
                const lanes = [];
                return currentData.map(product => {
                    let lane = 0;
                    while (
                        lanes[lane] &amp;&amp; lanes[lane].some(o =>
                            product.startMonth <= o.endMonth &amp;&amp; product.endMonth >= o.startMonth &amp;&amp;
                            Math.abs(product.basePrice - o.basePrice) < 220
                        )
                    ) {
                        lane++;
                    }
                    if (!lanes[lane]) lanes[lane] = [];
                    lanes[lane].push(product);
                    return { ...product, _lane: lane };
                });
            })();

            return (
                <div className=&quot;min-h-screen&quot;>
                    {/* HEADER */}
                    <header className=&quot;bg-white border-b border-gray-200 sticky top-0 z-10 shadow-sm&quot;>
                        <div className=&quot;max-w-7xl mx-auto px-4 sm:px-6 lg:px-8&quot;>
                            <div className=&quot;flex flex-col md:flex-row justify-between items-center py-4&quot;>
                                <div className=&quot;flex items-center space-x-3 mb-4 md:mb-0&quot;>
                                    <div className=&quot;w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center&quot;>
                                        <Sparkles className=&quot;text-white w-6 h-6&quot; />
                                    </div>
                                    <h1 className=&quot;text-2xl font-bold tracking-tight&quot;>Roadmap Produits GP</h1>
                                </div>
                                <div className=&quot;flex items-center space-x-2&quot;>
                                    <div className=&quot;flex space-x-2 bg-gray-100 p-1 rounded-lg&quot;>
                                        {years.map(year => (
                                            <button
                                                key={year}
                                                onClick={() => setActiveYear(year)}
                                                className={`px-4 py-1.5 rounded-md text-sm font-medium transition-all ${
                                                    activeYear === year
                                                        ? 'bg-white shadow text-blue-600'
                                                        : 'text-gray-500 hover:text-gray-700'
                                                }`}
                                            >{year}</button>
                                        ))}
                                    </div>
                                    {!editMode ? (
                                        <button
                                            onClick={() => { setShowAdminInput(s => !s); setAdminError(false); setAdminPassword(''); }}
                                            className=&quot;p-2.5 rounded-lg border border-gray-200 text-gray-400 hover:text-gray-600 hover:border-gray-300 transition-colors&quot;
                                            title=&quot;Mode Edition&quot;
                                        >
                                            <Lock className=&quot;w-4 h-4&quot; />
                                        </button>
                                    ) : (
                                        <button
                                            onClick={handleAdminLock}
                                            className=&quot;p-2.5 rounded-lg border border-green-200 bg-green-50 text-green-600 hover:bg-green-100 transition-colors&quot;
                                            title=&quot;Quitter le mode edition&quot;
                                        >
                                            <Unlock className=&quot;w-4 h-4&quot; />
                                        </button>
                                    )}
                                </div>
                            </div>

                            {/* Barre mot de passe Admin */}
                            {showAdminInput &amp;&amp; !editMode &amp;&amp; (
                                <div className=&quot;bg-gray-900 px-4 py-3 -mx-4 sm:-mx-6 lg:-mx-8 mb-2 flex items-center gap-3&quot;>
                                    <Lock className=&quot;w-4 h-4 text-yellow-400 flex-shrink-0&quot; />
                                    <span className=&quot;text-xs text-gray-300 font-medium whitespace-nowrap&quot;>Mode Edition</span>
                                    <input
                                        type=&quot;password&quot;
                                        value={adminPassword}
                                        onChange={e => { setAdminPassword(e.target.value); setAdminError(false); }}
                                        onKeyDown={e => e.key === 'Enter' &amp;&amp; handleAdminUnlock()}
                                        placeholder=&quot;Mot de passe&quot;
                                        autoFocus
                                        className={`flex-1 bg-gray-800 text-white text-xs px-3 py-1.5 rounded-lg border outline-none focus:border-blue-500 ${adminError ? 'border-red-500' : 'border-gray-700'}`}
                                    />
                                    <button
                                        onClick={handleAdminUnlock}
                                        className=&quot;px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors whitespace-nowrap&quot;
                                    >Acceder</button>
                                    {adminError &amp;&amp; <span className=&quot;text-xs text-red-400 whitespace-nowrap&quot;>Mot de passe incorrect</span>}
                                </div>
                            )}

                            {/* Bandeau mode edition actif */}
                            {editMode &amp;&amp; (
                                <div className=&quot;bg-yellow-50 border-y border-yellow-200 px-4 py-2 -mx-4 sm:-mx-6 lg:-mx-8 mb-2 flex flex-wrap items-center gap-2&quot;>
                                    <Sparkles className=&quot;w-3.5 h-3.5 text-yellow-500&quot; />
                                    <span className=&quot;text-xs font-semibold text-yellow-700&quot;>Mode Edition actif</span>
                                    <div className=&quot;flex bg-white rounded-lg border border-yellow-200 p-0.5 ml-2&quot;>
                                        <button
                                            onClick={() => setEditorView(false)}
                                            className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${!editorView ? 'bg-yellow-500 text-white' : 'text-gray-500'}`}
                                        >Vue Roadmap</button>
                                        <button
                                            onClick={() => setEditorView(true)}
                                            className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${editorView ? 'bg-yellow-500 text-white' : 'text-gray-500'}`}
                                        >Editeur</button>
                                    </div>
                                    <div className=&quot;ml-auto flex items-center gap-2&quot;>
                                        <button
                                            onClick={handleExportData}
                                            className=&quot;inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors&quot;
                                        ><Download className=&quot;w-3.5 h-3.5&quot; />Exporter (JSON)</button>
                                        <button
                                            onClick={handleResetData}
                                            className=&quot;inline-flex items-center gap-1.5 px-3 py-1.5 border border-gray-200 hover:bg-gray-50 text-gray-600 text-xs font-medium rounded-lg transition-colors&quot;

                                                activeCategory === cat.id
                                                    ? 'border-blue-600 text-blue-600'
                                                    : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'

                                        >
                                            <Icon className=&quot;w-4 h-4&quot; />
                                            <span>{cat.name}</span>
                                        </button>
                                    );
                                })}
                            </div>
                            {showRangeFilter &amp;&amp; !(editMode &amp;&amp; editorView) &amp;&amp; (
                                <div className=&quot;flex space-x-2 pb-4 pt-1&quot;>
                                    {rangeFilters.map(rf => (
                                        <button
                                            key={rf.id}
                                            onClick={() => setActiveRange(rf.id)}
                                            className={`px-3 py-1.5 rounded-full text-xs font-medium border transition-colors ${
                                                activeRange === rf.id
                                                    ? 'bg-blue-600 border-blue-600 text-white'
                                                    : 'bg-white border-gray-200 text-gray-500 hover:text-gray-700 hover:border-gray-300'
                                            }`}
                                        >{rf.label}</button>
                                    ))}
                                </div>
                            )}
                        </div>
                    </header>

                    {/* MAIN */}
                    <main className=&quot;max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8&quot;>
                        {editMode &amp;&amp; editorView ? (
                            <DataEditor data={data} setData={setData} activeCategory={activeCategory} activeYear={activeYear} categories={categories} />
                        ) : (
                        <div className=&quot;bg-white rounded-2xl shadow-sm border border-gray-200 p-6 overflow-hidden&quot;>
                            <div className=&quot;mb-6&quot;>
                                <h2 className=&quot;text-xl font-bold flex items-center&quot;>
                                    Vue d'ensemble
                                    <ChevronRight className=&quot;w-4 h-4 mx-2 text-gray-400&quot; />
                                    {categories.find(c => c.id === activeCategory)?.name} {activeYear}
                                </h2>
                                <p className=&quot;text-sm text-gray-500 mt-1&quot;>
                                    Les produits sont positionnés selon leur mois de lancement estimé et leur prix d'entrée (RRP).
                                </p>
                            </div>

                            {/* GRAPHIQUE */}
                            <div className=&quot;relative w-full h-[600px] mt-8 bg-gray-50 rounded-xl border border-gray-100&quot;>
                                {/* Axe Y */}
                                <div className=&quot;absolute left-0 top-0 bottom-8 w-16 border-r border-gray-200 flex flex-col justify-between text-xs text-gray-400 font-medium&quot;>
                                    {priceSteps.slice().reverse().map((price, i) => (
                                        <div key={i} className=&quot;relative h-0 flex items-center justify-end pr-2&quot;>
                                            <span className=&quot;absolute -translate-y-1/2&quot;>{price}€</span>
                                        </div>
                                    ))}
                                </div>

                                {/* Zone graphique */}
                                <div className=&quot;absolute left-16 top-0 right-0 bottom-8&quot;>
                                    {/* Grille mois */}
                                    <div className=&quot;absolute inset-0 flex&quot;>
                                        {months.map((month, i) => (
                                            <div key={i} className=&quot;flex-1 border-r border-gray-100 relative&quot;>
                                                <div className=&quot;absolute -bottom-8 left-0 right-0 text-center text-xs text-gray-500 font-medium py-2&quot;>
                                                    {month}
                                                </div>
                                            </div>
                                        ))}
                                    </div>

                                    {/* Lignes horizontales prix */}
                                    {priceSteps.map((price, i) => (
                                        <div
                                            key={i}
                                            className=&quot;absolute left-0 right-0 border-b border-dashed border-gray-200 opacity-50&quot;
                                            style={{ bottom: `${((price - minPrice) / priceSpan) * 100}%` }}
                                        />
                                    ))}

                                    {/* Produits */}
                                    {positionedData.length > 0 ? positionedData.map(product => {
                                        const bottomPercent = ((product.basePrice - minPrice) / priceSpan) * 100;
                                        const leftPercent   = (product.startMonth / 12) * 100;
                                        const widthPercent  = ((product.endMonth - product.startMonth + 1) / 12) * 100;
                                        const laneOffset    = product._lane * 38;
                                        return (
                                            <div
                                                key={product.id}
                                                onClick={() => setSelectedProduct(product)}
                                                className={`absolute h-8 rounded-full shadow-md cursor-pointer transition-all hover:scale-[1.02] hover:shadow-lg hover:z-50 flex items-center px-4 overflow-hidden z-10 ${product.colorClass} text-white border border-white/10`}
                                                style={{
                                                    bottom: `calc(${bottomPercent}% - 16px + ${laneOffset}px)`,
                                                    left:   `${leftPercent}%`,
                                                    width:  `${widthPercent}%`,
                                                }}
                                            >
                                                <span className=&quot;text-sm font-semibold truncate drop-shadow-md&quot;>
                                                    {product.name} <span className=&quot;opacity-75 font-normal ml-1&quot;>({product.basePrice}€)</span>
                                                </span>
                                            </div>
                                        );
                                    }) : (
                                        <div className=&quot;absolute inset-0 flex items-center justify-center text-gray-400&quot;>
                                            <p>Aucune donnée disponible pour cette année et cette catégorie.</p>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        )}
                    </main>

                    {/* MODAL */}
                    {selectedProduct &amp;&amp; (
                        <ProductModal product={selectedProduct} onClose={() => setSelectedProduct(null)} />
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
window.addEventListener('message', function(e){ if(e.data &amp;&amp; e.data.samsungNav &amp;&amp; window.__rpNav) window.__rpNav(e.data.samsungNav); });
        </script>
</body>
</html>

        // ==================================================================================
        // 2. UTILITAIRES DE CALCUL ET DE FORMATAGE
        // ==================================================================================

        const parseCSV = (text) => {
            const lines = text.split('\n');
            const result = [];
            for(let i = 1; i < lines.length; i++){
                if(!lines[i] || lines[i].trim() === &quot;&quot;) continue;
                const currentline = lines[i].split(',');
                const category = currentline[0] ? currentline[0].trim() : &quot;&quot;;
                const launch = currentline[1] ? currentline[1].trim() : &quot;&quot;;
                const range = currentline[2] ? currentline[2].trim() : &quot;&quot;;
                const model = currentline[3] ? currentline[3].trim() : &quot;&quot;;
                const value = currentline[4] ? currentline[4].trim() : &quot;&quot;; 
                const endSupport = currentline[5] ? currentline[5].trim() : null;
                if(model) result.push({ category, launch, range, model, value, endSupport });
            }
            return result;
        };

        const normalizeModel = (name) => name ? name.toLowerCase().replace(/\s+/g, '').replace('series', '').replace('5g', '').trim() : '';

        const calculateEndOfSupport = (launchDate, durationString) => {
            if (!launchDate || !durationString) return null;
            const yearsMatch = durationString.match(/(\d+)/);
            if (!yearsMatch) return null;
            const years = parseInt(yearsMatch[0], 10);
            const launchYear = parseInt(launchDate.split('-')[0], 10);
            return isNaN(launchYear) ? null : launchYear + years;
        };
        
        const isProductEOL = (endSupportStr) => {
            if (!endSupportStr || !endSupportStr.trim().startsWith('Q')) return false;
            try {
                const parts = endSupportStr.trim().split(' ');
                if (parts.length !== 2) return false;
                const endQ = parseInt(parts[0].replace('Q', ''));
                const endYear = parseInt(parts[1]);
                if (isNaN(endQ) || isNaN(endYear)) return false;
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth() + 1; // 1-12
                const currentQ = Math.ceil(currentMonth / 3);
                
                if (endYear < currentYear) return true;
                if (endYear === currentYear &amp;&amp; endQ < currentQ) return true;
                return false;
            } catch (e) {
                return false;
            }
        };

        const formatFrenchDate = (dateString) => {
            if (!dateString) return '';
            try {
                if (dateString.length === 4) return dateString;
                const date = new Date(dateString);
                if (isNaN(date.getTime())) return dateString;
                const formatter = new Intl.DateTimeFormat('fr-FR', { month: 'short', year: 'numeric' });
                const parts = formatter.formatToParts(date);
                const month = parts.find(p => p.type === 'month').value;
                const year = parts.find(p => p.type === 'year').value;
                return `${month.charAt(0).toUpperCase() + month.slice(1)} ${year}`;
            } catch (e) {
                return dateString;
            }
        };

        const buildInitialOsSmrRows = () => {
            const smrList = parseCSV(rawSMRData);
            const osList = parseCSV(rawOSData);
            const mergedMap = new Map();

            const processItem = (item, type) => {
                const key = normalizeModel(item.model);
                let finalRange = item.range;
                if (finalRange.trim() === 'Premium') {
                    if (item.model.includes('Z Fold') || item.model.includes('Z Flip')) finalRange = 'Gamme Z';
                    else if (item.model.startsWith('S') || item.model.startsWith('Tab S')) finalRange = 'Gamme S';
                }

                if (!mergedMap.has(key)) {
                    mergedMap.set(key, {
                        model: item.model, category: item.category, range: finalRange,
                        launch: item.launch,
                        smrDuration: type === 'smr' ? item.value : 'Non spécifié',
                        endSupport: type === 'smr' ? item.endSupport : null,
                        osCount: type === 'os' ? item.value : 'Non spécifié',
                        androidFinal: type === 'os' ? item.endSupport : null,
                    });
                } else {
                    const existing = mergedMap.get(key);
                    if (type === 'smr') { existing.smrDuration = item.value; existing.endSupport = item.endSupport; }
                    if (type === 'os') { existing.osCount = item.value; existing.androidFinal = item.endSupport; }
                    if (existing.range === 'Premium') existing.range = finalRange;
                }
            };

            smrList.forEach(item => processItem(item, 'smr'));
            osList.forEach(item => {
                let found = false;
                const normalizedInput = normalizeModel(item.model);
                if (mergedMap.has(normalizedInput)) {
                    const entry = mergedMap.get(normalizedInput);
                    entry.osCount = item.value; entry.androidFinal = item.endSupport; found = true;
                } else {
                    for (let [key, val] of mergedMap) {
                        if (key.includes(normalizedInput) || normalizedInput.includes(key)) {
                            val.osCount = item.value; val.androidFinal = item.endSupport; found = true; break;
                        }
                    }
                }
                if (!found) processItem(item, 'os');
            });

            return Array.from(mergedMap.values());
        };

        const getParsedOSAndSMRData = (rows) => {
            let finalDevices = rows.map((d, idx) => ({
                ...d,
                id: `${normalizeModel(d.model)}-${idx}`,
                launchTimestamp: new Date(d.launch).getTime() || 0,
                endYear: calculateEndOfSupport(d.launch, d.smrDuration),
                isEOL: isProductEOL(d.endSupport)
            }));

            finalDevices.sort((a, b) => b.launchTimestamp - a.launchTimestamp);
            const top3Ids = new Set(finalDevices.slice(0, 3).map(d => d.id));
            return finalDevices.map(d => ({ ...d, isNew: top3Ids.has(d.id) }));

            const END_DATE = new Date(`${END_YEAR}-12-31`).getTime();
            const TOTAL_DURATION = END_DATE - START_DATE;
            const today = new Date().getTime();
            const todayPercent = ((today - START_DATE) / TOTAL_DURATION) * 100;
            const isTodayVisible = today >= START_DATE &amp;&amp; today <= END_DATE;

            const getPriceBracket = (priceStr) => {
                if(!priceStr) return 'Inconnu';
                const price = parseInt(priceStr.replace(/\D/g, ''), 10);
                if (isNaN(price)) return 'Inconnu';
                if (price >= 1000) return '+1000€';
                if (price >= 600) return '600-999€';
                if (price >= 300) return '300-599€';
                return '0-299€';
            };

            const getBracketOrder = (bracket) => {
                if (bracket === '+1000€') return 1;
                if (bracket === '600-999€') return 2;

                if (bracket === '0-299€') return 4;

                    const visibleEnd = Math.min(pEnd, END_DATE);
                    const left = ((visibleStart - START_DATE) / TOTAL_DURATION) * 100;

                    const numericPrice = parseInt((p.price||'').replace(/\D/g, ''), 10) || 0;
                    const bracket = getPriceBracket(p.price);

                    return { ...p, left, width, visibleStart, visibleEnd, numericPrice, bracket };
                }).filter(p => p.visibleEnd >= START_DATE &amp;&amp; p.visibleStart <= END_DATE);

                withPositions.sort((a, b) => {

        // --- VUE 2 : OS ET SMR ---

        const DeviceModalOS = ({ device, onClose }) => {
            if (!device) return null;
            return (
                <div className=&quot;fixed inset-0 z-[100] flex items-center justify-center p-4&quot;>
                    <div className=&quot;absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity&quot; onClick={onClose} />

                                </div>
                                <div className=&quot;bg-purple-50/50 p-4 rounded-xl border border-purple-100&quot;>
                                    <div className=&quot;text-purple-700 mb-1&quot;><Clock size={18} /></div>
                                    <div className=&quot;text-xs text-purple-600 font-semibold uppercase&quot;>Fin de support</div>
