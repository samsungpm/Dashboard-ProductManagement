        };

        const ViewOSAndSMR = ({ rows }) => {
            const activeDevices = useMemo(() => getParsedOSAndSMRData(rows), [rows]);
            const [filteredDevices, setFilteredDevices] = useState(activeDevices);
            const [searchTerm, setSearchTerm] = useState('');
            const [categoryFilter, setCategoryFilter] = useState('Tous');
            const [rangeFilter, setRangeFilter] = useState('Tous');
            const [sortOrder, setSortOrder] = useState('newest'); 
            const [selectedDevice, setSelectedDevice] = useState(null);

            useEffect(() => {
                let result = activeDevices.filter(device => {
                    const matchSearch = device.model.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchCategory = categoryFilter === 'Tous' || device.category.toLowerCase().includes(categoryFilter.toLowerCase());
                    const matchRange = rangeFilter === 'Tous' || device.range.toLowerCase().includes(rangeFilter.toLowerCase());
                    return matchSearch &amp;&amp; matchCategory &amp;&amp; matchRange;
                });
                result.sort((a, b) => {
                    if (sortOrder === 'newest') return b.launchTimestamp - a.launchTimestamp;
                    if (sortOrder === 'oldest') return a.launchTimestamp - b.launchTimestamp;
                    if (sortOrder === 'alpha') return a.model.localeCompare(b.model);
                    return 0;
                });
                setFilteredDevices(result);
            }, [activeDevices, searchTerm, categoryFilter, rangeFilter, sortOrder]);

            const ranges = ['Tous', ...new Set(activeDevices.map(d => d.range))].filter(Boolean).sort();

            return (
                <div className=&quot;animate-in fade-in duration-500&quot;>
                    <div className=&quot;bg-gradient-to-b from-white to-[#f0f4f8] pt-6 md:pt-10 pb-8 md:pb-12 px-4 border-b border-gray-200&quot;>
                        <div className=&quot;max-w-4xl mx-auto text-center space-y-4 md:space-y-6&quot;>
                            <h1 className=&quot;text-2xl md:text-5xl font-extrabold text-gray-900 tracking-tight leading-tight&quot;>Montée d'OS et SMR</h1>
                            <div className=&quot;relative max-w-xl mx-auto mt-6 group&quot;>
                                <div className=&quot;absolute inset-y-0 left-0 pl-4 md:pl-5 flex items-center pointer-events-none&quot;><Search className=&quot;h-4 w-4 md:h-5 md:w-5 text-gray-400&quot; /></div>
                                <input type=&quot;text&quot; className=&quot;block w-full pl-10 md:pl-12 pr-4 py-3 md:py-4 rounded-full border border-gray-200 shadow-lg shadow-gray-200/50 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 text-gray-900 placeholder-gray-400 outline-none transition-all text-sm md:text-base&quot;
                                    placeholder=&quot;Rechercher (ex: S24, Tab Active...)&quot; value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} />
                            </div>
                        </div>
                    </div>

                    <div className=&quot;max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-10&quot;>
                        <div className=&quot;flex flex-col lg:flex-row justify-between gap-4 mb-6 md:mb-8 bg-white p-4 rounded-2xl shadow-sm border border-gray-100&quot;>
                            <div className=&quot;flex flex-col sm:flex-row gap-4&quot;>
                                <div className=&quot;flex bg-gray-100 p-1 rounded-lg w-full sm:w-auto&quot;>
                                    {['Tous', 'Smartphone', 'Tablette'].map((cat) => (
                                        <button key={cat} onClick={() => setCategoryFilter(cat)} className={`flex-1 sm:flex-none px-3 md:px-4 py-2 rounded-md text-sm font-medium transition-all ${categoryFilter === cat ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>{cat}</button>
                                    ))}
                                </div>
                                <div className=&quot;flex items-center gap-2 w-full sm:w-auto&quot;>
                                    <Filter size={16} className=&quot;text-gray-400 hidden sm:block&quot; />
                                    <select value={rangeFilter} onChange={(e) => setRangeFilter(e.target.value)} className=&quot;w-full sm:w-auto bg-white border border-gray-200 text-gray-700 text-sm rounded-lg p-2.5 outline-none hover:bg-gray-50&quot;>{ranges.map(range => <option key={range} value={range}>{range}</option>)}</select>
                                </div>
                            </div>
                            <div className=&quot;flex items-center gap-3 w-full sm:w-auto justify-end&quot;>
                                <span className=&quot;text-sm text-gray-500 hidden sm:block&quot;>Trier :</span>
                                <select value={sortOrder} onChange={(e) => setSortOrder(e.target.value)} className=&quot;w-full sm:w-auto bg-white border border-gray-200 text-gray-700 text-sm rounded-lg p-2.5 outline-none hover:bg-gray-50&quot;><option value=&quot;newest&quot;>Récent</option><option value=&quot;oldest&quot;>Ancien</option><option value=&quot;alpha&quot;>A-Z</option></select>
                            </div>
                        </div>

                        <div className=&quot;grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6&quot;>
                            {filteredDevices.map((device, idx) => (
                                <div key={`${device.model}-${idx}`} onClick={() => setSelectedDevice(device)} className=&quot;group bg-white rounded-2xl p-6 border border-gray-100 shadow-sm hover:shadow-xl hover:-translate-y-1 transition-all cursor-pointer relative overflow-hidden active:scale-[0.98]&quot;>
                                    {device.isEOL &amp;&amp; (
                                        <div className=&quot;absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-3 py-1 rounded-bl-xl shadow-sm z-20 flex items-center gap-1&quot;>
                                            <AlertTriangle size={10} strokeWidth={3} /> EOL
                                        </div>
                                    )}
                                    
                                    <div className=&quot;flex justify-between items-start mb-4&quot;>
                                        <div className=&quot;flex flex-col gap-2 items-start&quot;><Badge type={device.range} text={device.range} /></div>
                                        <div className=&quot;text-xs font-semibold text-gray-400 bg-gray-50 px-2 py-1 rounded-md&quot;>{formatFrenchDate(device.launch)}</div>
                                    </div>
                                    <h3 className=&quot;text-xl font-bold text-gray-900 mb-1 group-hover:text-blue-700 transition-colors&quot;>{device.model}</h3>
                                    <div className=&quot;grid grid-cols-2 gap-3 mb-4 mt-6&quot;>
                                        <div className=&quot;bg-gray-50 rounded-xl p-3&quot;><div className=&quot;flex items-center gap-2 mb-1 text-gray-500&quot;><Shield size={14} /><span className=&quot;text-[10px] font-bold uppercase&quot;>Sécurité</span></div><div className=&quot;text-sm font-bold text-gray-800 truncate&quot;>{(device.smrDuration||'').split(' ')[0]} ans</div></div>
                                        <div className=&quot;bg-gray-50 rounded-xl p-3&quot;><div className=&quot;flex items-center gap-2 mb-1 text-gray-500&quot;><ArrowUpCircle size={14} /><span className=&quot;text-[10px] font-bold uppercase&quot;>OS</span></div><div className=&quot;text-sm font-bold text-gray-800 truncate&quot;>{(device.osCount||'').replace(&quot;montées d'OS&quot;, &quot;&quot;).trim()} MAJ</div></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    {selectedDevice &amp;&amp; <DeviceModalOS device={selectedDevice} onClose={() => setSelectedDevice(null)} />}
                </div>
            );
        };

        // --- VUE 3 : COMPARATEUR ---

        const ViewComparison = ({ products }) => {
            const activeComparison = products;
            const [selectedProducts, setSelectedProducts] = useState(['s26ultra', 'tab_s11 ultra', 's26', 'a56', 'tab_active_5 Pro']);

            const groups = useMemo(() => {
                const g = {};
                Object.entries(activeComparison).forEach(([key, product]) => {
                    const cat = product.category || 'Autres';
                    if (!g[cat]) g[cat] = [];
                    g[cat].push({ key, name: product.name });
                });
                return g;
            }, [activeComparison]);

            const handleSelectChange = (index, value) => {
                const newSelection = [...selectedProducts];
                newSelection[index] = value;
                setSelectedProducts(newSelection);
            };

            const setPreset = (keys) => {
                const newSelection = [...selectedProducts];
                keys.forEach((key, i) => {
                    if (activeComparison[key]) newSelection[i] = key;
                });
                setSelectedProducts(newSelection);
            };

            return (
                <div className=&quot;animate-in fade-in duration-500 bg-white&quot;>
                    <div className=&quot;bg-white border-b border-gray-200 shadow-sm py-3 px-4&quot;>
                         <div className=&quot;max-w-full mx-auto&quot;>
                            <div className=&quot;flex flex-col md:flex-row gap-2 mb-2 items-start md:items-center overflow-x-auto pb-2 scrollbar-hide&quot;>
                                <span className=&quot;text-xs font-bold text-gray-400 uppercase tracking-wider whitespace-nowrap hidden md:inline&quot;>Vues :</span>
                                <div className=&quot;flex gap-2 w-max&quot;>
                                    <button onClick={() => setPreset(['s26ultra', 's26plus', 's26', 's25fe', 's25edge'])} className=&quot;text-[10px] md:text-xs font-semibold px-3 py-1 border border-gray-300 rounded-full text-gray-700 bg-white hover:bg-black hover:text-white transition-colors&quot;>SMT S</button>
                                    <button onClick={() => setPreset(['zfold7', 'zflip7', 'zflip7fe', 's26ultra', 's26'])} className=&quot;text-[10px] md:text-xs font-semibold px-3 py-1 border border-gray-300 rounded-full text-gray-700 bg-white hover:bg-black hover:text-white transition-colors&quot;>SMT Z</button>
                                    <button onClick={() => setPreset(['a56', 'a36', 'a26', 'a17_5g', 'a16_4g'])} className=&quot;text-[10px] md:text-xs font-semibold px-3 py-1 border border-gray-300 rounded-full text-gray-700 bg-white hover:bg-black hover:text-white transition-colors&quot;>SMT A</button>
                                    <button onClick={() => setPreset(['xcover7pro', 'xcover7', 'a56', 's25fe', 's25'])} className=&quot;text-[10px] md:text-xs font-semibold px-3 py-1 border border-gray-300 rounded-full text-gray-700 bg-white hover:bg-black hover:text-white transition-colors&quot;>SMT Durcie</button>
                                    <button onClick={() => setPreset(['tab_s11 ultra', 'tab_s10+', 'tab_s11', 'tab_s10 FE+', 'tab_s10 FE'])} className=&quot;text-[10px] md:text-xs font-semibold px-3 py-1 border border-gray-300 rounded-full text-gray-700 bg-white hover:bg-black hover:text-white transition-colors&quot;>TAB S</button>
                                    <button onClick={() => setPreset(['tab_A_11+', 'tab_A_11', 'tab_s10 Lite', 'tab_active_5', 'tab_active_5 Pro'])} className=&quot;text-[10px] md:text-xs font-semibold px-3 py-1 border border-gray-300 rounded-full text-gray-700 bg-white hover:bg-black hover:text-white transition-colors&quot;>TAB A + Durcie</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className=&quot;w-full overflow-hidden&quot;>
                        <div className=&quot;overflow-x-auto pb-12 -webkit-overflow-scrolling-touch&quot;>
                            <table className=&quot;w-full text-left border-collapse min-w-[1000px] md:min-w-[1200px]&quot;>
                                <thead>
                                    <tr>
                                        <th className=&quot;p-4 md:p-6 sticky-col w-32 md:w-40 min-w-[130px] md:min-w-[160px] z-50 border-b border-gray-200 align-bottom bg-white top-[64px]&quot;>
                                            <span className=&quot;text-xs font-bold text-gray-400 uppercase flex items-center gap-1&quot;><ArrowRightLeft size={14}/> Comparer</span>
                                        </th>
                                        {selectedProducts.map((sel, idx) => {
                                            const p = activeComparison[sel] || {};
                                            const imgSrc = (!p.img || p.img === 'placeholder') ? getPlaceholderImg(p.name || 'N/A') : p.img;
                                            return (
                                                <th key={idx} className=&quot;p-4 w-1/5 min-w-[180px] md:min-w-[200px] align-top text-center border-l border-gray-100 bg-white border-b border-gray-200 transition duration-300 hover:bg-gray-50 sticky top-[64px] z-40 shadow-sm&quot;>
                                                    <div className=&quot;flex flex-col items-center h-full justify-end&quot;>
                                                        <select 
                                                            value={sel} 
                                                            onChange={(e) => handleSelectChange(idx, e.target.value)}
                                                            className=&quot;mb-4 w-full text-xs border border-gray-200 rounded p-1 text-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none bg-white&quot;
                                                        >
                                                            <option value=&quot;&quot; disabled>Sélectionner...</option>
                                                            {Object.entries(groups).map(([groupName, items]) => (
                                                                <optgroup key={groupName} label={groupName}>
                                                                    {items.map(item => (
                                                                        <option 
                                                                            key={item.key} 
                                                                            value={item.key}
                                                                            disabled={selectedProducts.includes(item.key) &amp;&amp; selectedProducts[idx] !== item.key}
                                                                        >
                                                                            {item.name}
                                                                        </option>
                                                                    ))}
                                                                </optgroup>
                                                            ))}
                                                        </select>

                                                        <img src={imgSrc} alt={p.name} className=&quot;h-24 md:h-32 object-contain mx-auto mb-4 hover:scale-105 transition-transform duration-300&quot; />
                                                        <h3 className=&quot;text-sm md:text-base font-bold mb-1 text-gray-900&quot;>{p.name || '-'}</h3>
                                                        <span className=&quot;text-[#1428a0] font-medium text-xs md:text-sm&quot;>{p.price || '-'}</span>
                                                    </div>
                                                </th>
                                            );
                                        })}
                                    </tr>
                                </thead>
                                <tbody className=&quot;text-sm text-gray-700&quot;>
                                    {comparisonRows.map((row, rIdx) => (
                                        <tr key={row.id} className={`${rIdx % 2 === 0 ? 'bg-white' : 'bg-gray-50'} border-t border-gray-200 hover:bg-blue-50 transition-colors`}>
                                            <td className=&quot;p-3 md:p-4 font-semibold text-gray-800 sticky-col border-r border-gray-100 bg-inherit text-[10px] md:text-xs uppercase tracking-wide&quot;>
                                                {row.label}
                                            </td>
                                            {selectedProducts.map((sel, idx) => {
                                                const p = activeComparison[sel] || {};
                                                let content = p[row.id];
                                                
                                                let displayContent = content || '-';
                                                
                                                if (row.id === 'ee') {
                                                    if (content === 'Oui' || content?.includes('Oui')) {
                                                        displayContent = <span className=&quot;ee-badge px-2 py-1 rounded text-xs font-semibold flex items-center justify-center w-fit mx-auto&quot;><Check size={12} className=&quot;mr-1&quot;/>Oui</span>;
                                                    } else if (content === 'Mode projet') {
                                                        displayContent = <span className=&quot;bg-gray-100 text-gray-600 px-2 py-1 rounded text-xs font-semibold border border-gray-200 whitespace-nowrap&quot;>En cours</span>;
                                                    } else if (!content || content === '-') {
                                                        displayContent = <span className=&quot;text-gray-300 text-xs&quot;>-</span>;
                                                    }
                                                }
                                                
                                                if (row.id === 'fiche') {
                                                    if(content &amp;&amp; content !== '-') {
                                                        displayContent = (
                                                            <a href={content} target=&quot;_blank&quot; rel=&quot;noopener noreferrer&quot; className=&quot;inline-flex items-center gap-1 px-3 py-1.5 md:px-4 md:py-2 bg-[#003057] text-white text-[10px] md:text-xs font-bold rounded-full hover:bg-[#1428A0] transition-all shadow-sm hover:shadow-md whitespace-nowrap&quot;>
                                                                Ouvrir <ExternalLink size={12} />
                                                            </a>
                                                        );
                                                    } else {
                                                        displayContent = <span className=&quot;text-gray-300 text-xs&quot;>-</span>;
                                                    }
                                                }

                                                return (
                                                    <td key={idx} className={`p-3 md:p-4 text-center border-l border-gray-100 align-middle ${row.highlight ? 'font-semibold text-black' : ''} ${row.small ? 'text-xs text-gray-600' : ''} ${row.mono ? 'font-mono text-xs' : ''}`}>
                                                        {displayContent}
                                                    </td>
                                                );
                                            })}
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // --- EDITEUR DE DONNEES (MODE EDITION) ---

        const EditorShell = ({ title, onAdd, addLabel, children }) => (
            <div className=&quot;bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden&quot;>
                <div className=&quot;flex items-center justify-between px-4 py-3 border-b border-gray-100 bg-gray-50&quot;>
                    <h3 className=&quot;font-bold text-gray-700 text-sm&quot;>{title}</h3>
                    {onAdd &amp;&amp; (
                        <button onClick={onAdd} className=&quot;flex items-center gap-1.5 text-xs font-bold text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors&quot;>
                            <Plus size={14} /> {addLabel}
                        </button>
                    )}
                </div>
                <div className=&quot;overflow-x-auto&quot;>
                    {children}
                </div>
            </div>
        );

        const EditorTh = ({ children }) => (
            <th className=&quot;px-2 py-2 text-left font-bold text-gray-500 uppercase tracking-wide whitespace-nowrap&quot;>{children}</th>
        );

        const EditorInput = (props) => (
            <input {...props} className={`w-full min-w-[90px] px-2 py-1 border border-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300 ${props.className || ''}`} />
        );

        const ComparisonEditor = ({ products, setProducts }) => {
            const FIELDS = ['name','category','price','img','ee','os','screen','proc','storage','battery','photo','conn','sim','security','weight','plus','code','fiche'];
            const BOOL_FIELDS = ['ee', 'os'];
            const entries = Object.entries(products);

            const updateField = (key, field, value) => {
                setProducts(prev => ({ ...prev, [key]: { ...prev[key], [field]: value } }));
            };
            const updateKey = (oldKey, newKey) => {
                const cleaned = (newKey || '').trim();
                if (!cleaned || cleaned === oldKey || products[cleaned]) return;
                setProducts(prev => {
                    const next = {};
                    Object.entries(prev).forEach(([k, v]) => { next[k === oldKey ? cleaned : k] = v; });
                    return next;
                });
            };
            const addRow = () => {
                const newKey = `produit-${Date.now()}`;
                const blank = {};
                FIELDS.forEach(f => { blank[f] = BOOL_FIELDS.includes(f) ? false : ''; });
                blank.name = 'Nouveau produit';
                setProducts(prev => ({ ...prev, [newKey]: blank }));
            };
            const removeRow = (key) => {
                if (!window.confirm('Supprimer ce produit du comparateur ?')) return;
                setProducts(prev => {
                    const next = { ...prev };
                    delete next[key];
                    return next;
                });
            };

            return (
                <EditorShell title={`Comparateur (${entries.length} produits)`} onAdd={addRow} addLabel=&quot;Ajouter un produit&quot;>
                    <table className=&quot;min-w-full text-xs divide-y divide-gray-100&quot;>
                        <thead className=&quot;bg-gray-50&quot;>
                            <tr>
                                <EditorTh>Cle</EditorTh>
                                {FIELDS.map(f => <EditorTh key={f}>{f}</EditorTh>)}
                                <EditorTh></EditorTh>
                            </tr>
                        </thead>
                        <tbody className=&quot;divide-y divide-gray-50&quot;>
                            {entries.map(([key, prod]) => (
                                <tr key={key} className=&quot;hover:bg-gray-50&quot;>
                                    <td className=&quot;px-2 py-1.5&quot;>
                                        <EditorInput defaultValue={key} onBlur={(e) => updateKey(key, e.target.value)} className=&quot;font-mono text-[11px] min-w-[120px]&quot; />
                                    </td>
                                    {FIELDS.map(field => (
                                        <td key={field} className=&quot;px-2 py-1.5&quot;>
                                            {BOOL_FIELDS.includes(field) ? (
                                                <input type=&quot;checkbox&quot; checked={!!prod[field]} onChange={(e) => updateField(key, field, e.target.checked)} className=&quot;w-4 h-4&quot; />
                                            ) : (
                                                <EditorInput value={prod[field] ?? ''} onChange={(e) => updateField(key, field, e.target.value)} />
                                            )}
                                        </td>
                                    ))}
                                    <td className=&quot;px-2 py-1.5&quot;>
                                        <button onClick={() => removeRow(key)} className=&quot;text-gray-400 hover:text-red-600 p-1&quot;>
                                            <Trash2 size={14} />
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </EditorShell>
            );
        };

        const RoadmapEditor = ({ items, setItems }) => {
            const updateField = (idx, field, value) => {
                setItems(prev => prev.map((it, i) => i === idx ? { ...it, [field]: value } : it));
            };
            const addRow = () => {
                setItems(prev => ([...prev, { cat: 'Smartphone', type: 'phone', name: 'Nouveau modele', memory: '', price: '', start: '2026-01-01', end: '2026-12-31', notes: '' }]));
            };
            const removeRow = (idx) => {
                if (!window.confirm('Supprimer ce produit de la roadmap ?')) return;
                setItems(prev => prev.filter((_, i) => i !== idx));
            };

            return (
                <EditorShell title={`Roadmap Entreprise Edition (${items.length} produits)`} onAdd={addRow} addLabel=&quot;Ajouter un produit&quot;>
                    <table className=&quot;min-w-full text-xs divide-y divide-gray-100&quot;>
                        <thead className=&quot;bg-gray-50&quot;>
                            <tr>
                                <EditorTh>Categorie</EditorTh>
                                <EditorTh>Type</EditorTh>
                                <EditorTh>Nom</EditorTh>
                                <EditorTh>Memoire</EditorTh>
                                <EditorTh>Prix</EditorTh>
                                <EditorTh>Debut</EditorTh>
                                <EditorTh>Fin</EditorTh>
                                <EditorTh>Notes</EditorTh>
                                <EditorTh></EditorTh>
                            </tr>
                        </thead>
                        <tbody className=&quot;divide-y divide-gray-50&quot;>
                            {items.map((it, idx) => (
                                <tr key={idx} className=&quot;hover:bg-gray-50&quot;>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={it.cat ?? ''} onChange={(e) => updateField(idx, 'cat', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={it.type ?? ''} onChange={(e) => updateField(idx, 'type', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={it.name ?? ''} onChange={(e) => updateField(idx, 'name', e.target.value)} className=&quot;min-w-[140px]&quot; /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={it.memory ?? ''} onChange={(e) => updateField(idx, 'memory', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={it.price ?? ''} onChange={(e) => updateField(idx, 'price', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput type=&quot;date&quot; value={it.start ?? ''} onChange={(e) => updateField(idx, 'start', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput type=&quot;date&quot; value={it.end ?? ''} onChange={(e) => updateField(idx, 'end', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={it.notes ?? ''} onChange={(e) => updateField(idx, 'notes', e.target.value)} className=&quot;min-w-[160px]&quot; /></td>
                                    <td className=&quot;px-2 py-1.5&quot;>
                                        <button onClick={() => removeRow(idx)} className=&quot;text-gray-400 hover:text-red-600 p-1&quot;>
                                            <Trash2 size={14} />
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </EditorShell>
            );
        };

        const OsSmrEditor = ({ rows, setRows }) => {
            const updateField = (idx, field, value) => {
                setRows(prev => prev.map((r, i) => i === idx ? { ...r, [field]: value } : r));
            };
            const addRow = () => {
                setRows(prev => ([...prev, { model: 'Nouveau modele', category: 'Smartphone', range: 'Gamme S', launch: '2026-01-01', smrDuration: '5 ans', endSupport: '', osCount: '', androidFinal: '' }]));
            };
            const removeRow = (idx) => {
                if (!window.confirm('Supprimer cette ligne OS &amp; SMR ?')) return;
                setRows(prev => prev.filter((_, i) => i !== idx));
            };

            return (
                <EditorShell title={`OS &amp; SMR (${rows.length} appareils)`} onAdd={addRow} addLabel=&quot;Ajouter un appareil&quot;>
                    <table className=&quot;min-w-full text-xs divide-y divide-gray-100&quot;>
                        <thead className=&quot;bg-gray-50&quot;>
                            <tr>
                                <EditorTh>Modele</EditorTh>
                                <EditorTh>Categorie</EditorTh>
                                <EditorTh>Gamme</EditorTh>
                                <EditorTh>Lancement</EditorTh>
                                <EditorTh>Duree Support</EditorTh>
                                <EditorTh>Fin Support</EditorTh>
                                <EditorTh>Montees OS</EditorTh>
                                <EditorTh>Android Final</EditorTh>
                                <EditorTh></EditorTh>
                            </tr>
                        </thead>
                        <tbody className=&quot;divide-y divide-gray-50&quot;>
                            {rows.map((r, idx) => (
                                <tr key={idx} className=&quot;hover:bg-gray-50&quot;>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.model ?? ''} onChange={(e) => updateField(idx, 'model', e.target.value)} className=&quot;min-w-[160px]&quot; /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.category ?? ''} onChange={(e) => updateField(idx, 'category', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.range ?? ''} onChange={(e) => updateField(idx, 'range', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput type=&quot;date&quot; value={r.launch ?? ''} onChange={(e) => updateField(idx, 'launch', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.smrDuration ?? ''} onChange={(e) => updateField(idx, 'smrDuration', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.endSupport ?? ''} onChange={(e) => updateField(idx, 'endSupport', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.osCount ?? ''} onChange={(e) => updateField(idx, 'osCount', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;><EditorInput value={r.androidFinal ?? ''} onChange={(e) => updateField(idx, 'androidFinal', e.target.value)} /></td>
                                    <td className=&quot;px-2 py-1.5&quot;>
                                        <button onClick={() => removeRow(idx)} className=&quot;text-gray-400 hover:text-red-600 p-1&quot;>
                                            <Trash2 size={14} />
                                        </button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </EditorShell>
            );
        };

        const SmtDataEditor = ({ data, setData }) => {
            const [tab, setTab] = useState('roadmap');

            const setComparisonProducts = (updater) => {
                setData(prev => ({ ...prev, comparisonProducts: typeof updater === 'function' ? updater(prev.comparisonProducts) : updater }));
            };
            const setRoadmapProducts = (updater) => {
                setData(prev => ({ ...prev, roadmapProducts: typeof updater === 'function' ? updater(prev.roadmapProducts) : updater }));
            };
            const setOsSmrRows = (updater) => {
                setData(prev => ({ ...prev, osSmrRows: typeof updater === 'function' ? updater(prev.osSmrRows) : updater }));
            };

            const tabs = [
                { id: 'roadmap', label: 'Roadmap EE' },
                { id: 'ossmr', label: 'OS &amp; SMR' },
                { id: 'comparison', label: 'Comparateur' },
            ];

            return (
                <div className=&quot;max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 space-y-4&quot;>
                    <div className=&quot;flex gap-2 border-b border-gray-200 pb-2&quot;>
                        {tabs.map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`px-3 py-1.5 rounded-lg text-xs md:text-sm font-bold transition-colors ${tab === t.id ? 'bg-[#003057] text-white' : 'text-gray-500 hover:text-gray-700 bg-gray-100'}`}>
                                {t.label}
                            </button>
                        ))}
                    </div>
                    {tab === 'roadmap' &amp;&amp; <RoadmapEditor items={data.roadmapProducts} setItems={setRoadmapProducts} />}
                    {tab === 'ossmr' &amp;&amp; <OsSmrEditor rows={data.osSmrRows} setRows={setOsSmrRows} />}
                    {tab === 'comparison' &amp;&amp; <ComparisonEditor products={data.comparisonProducts} setProducts={setComparisonProducts} />}
                </div>
            );
        };
        // --- APPLICATION PRINCIPALE ---

        const DashboardMX = () => {
            const [currentView, setCurrentView] = useState('roadmap');
            useEffect(() => { window.__smsNav = (v) => { if (v !== 'editor') setCurrentView(v); }; }, []);

            const buildInitialData = () => ({
                comparisonProducts: JSON.parse(JSON.stringify(comparisonProducts)),
                roadmapProducts: JSON.parse(JSON.stringify(roadmapProducts)),
                osSmrRows: buildInitialOsSmrRows()
            });

            const [data, setData] = useState(() => {
                try {
                    const saved = localStorage.getItem('smtEditData');
                    if (saved) return JSON.parse(saved);
                } catch (e) {}
                return buildInitialData();
            });

            useEffect(() => {
                try { localStorage.setItem('smtEditData', JSON.stringify(data)); } catch (e) {}
            }, [data]);

            const [editMode, setEditMode] = useState(false);
            const [showAdminInput, setShowAdminInput] = useState(false);
            const [adminPassword, setAdminPassword] = useState('');
            const [adminError, setAdminError] = useState(false);

            const handleAdminUnlock = () => {
                if (adminPassword === 'admin') {
                    setEditMode(true);
                    setShowAdminInput(false);
                    setAdminError(false);
                    setAdminPassword('');
                    setCurrentView('editor');
                } else {
                    setAdminError(true);
                }
            };
            const handleAdminLock = () => {
                setEditMode(false);
                setShowAdminInput(false);
                setAdminPassword('');
                setAdminError(false);
                if (currentView === 'editor') setCurrentView('roadmap');
            };
            const handleResetData = () => {
                if (!window.confirm(&quot;Réinitialiser toutes les modifications et revenir aux données d'origine ?&quot;)) return;
                setData(buildInitialData());
            };
            const handleExportData = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'smt-data.json';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className=&quot;min-h-screen bg-[#f8f9fa] font-sans text-gray-800 selection:bg-blue-100 flex flex-col pb-20 md:pb-0&quot;>

                    <nav className=&quot;bg-white/90 backdrop-blur-md border-b border-gray-200 sticky top-0 z-50 transition-all shadow-sm h-16 relative&quot;>
                        <div className=&quot;max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-full&quot;>
                            <div className=&quot;flex justify-between items-center h-full&quot;>
                                <div className=&quot;flex items-center gap-2 md:gap-3 cursor-pointer shrink-0&quot; onClick={() => {window.scrollTo(0,0); setCurrentView('roadmap');}}>
                                    <img src=&quot;Logo Black/Samsung_Orig_Wordmark_BLACK_CMYK.svg&quot; alt=&quot;Samsung&quot; className=&quot;h-5 md:h-6 w-auto&quot; />
                                    <div className=&quot;h-4 w-px bg-gray-300 hidden sm:block&quot;></div>
                                    <span className=&quot;font-medium text-gray-600 tracking-tight text-xs md:text-base hidden sm:block&quot;>Product Management</span>
                                </div>

                                <div className=&quot;flex items-center gap-2&quot;>
                                    <div className=&quot;flex overflow-x-auto scrollbar-hide gap-2 p-1 max-w-[240px] md:max-w-none md:bg-gray-100 md:rounded-xl&quot;>
                                        <button onClick={() => setCurrentView('roadmap')} className={`whitespace-nowrap px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-bold transition-all flex items-center gap-2 ${currentView === 'roadmap' ? 'bg-[#003057] text-white md:bg-white md:text-[#003057] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                                            <MapIcon size={14} className=&quot;md:w-4 md:h-4&quot; /> Roadmap EE
                                        </button>
                                        <button onClick={() => setCurrentView('os-smr')} className={`whitespace-nowrap px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-bold transition-all flex items-center gap-2 ${currentView === 'os-smr' ? 'bg-[#003057] text-white md:bg-white md:text-[#003057] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                                            <Layout size={14} className=&quot;md:w-4 md:h-4&quot; /> OS &amp; SMR
                                        </button>
                                        <button onClick={() => setCurrentView('comparison')} className={`whitespace-nowrap px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-bold transition-all flex items-center gap-2 ${currentView === 'comparison' ? 'bg-[#003057] text-white md:bg-white md:text-[#003057] shadow-sm' : 'text-gray-500 hover:text-gray-700'}`}>
                                            <SlidersHorizontal size={14} className=&quot;md:w-4 md:h-4&quot; /> Comparer
                                        </button>
                                        {editMode &amp;&amp; (
                                            <button onClick={() => setCurrentView('editor')} className={`whitespace-nowrap px-3 md:px-4 py-1.5 md:py-2 rounded-lg text-xs md:text-sm font-bold transition-all flex items-center gap-2 ${currentView === 'editor' ? 'bg-yellow-400 text-yellow-900 shadow-sm' : 'text-yellow-600 hover:text-yellow-800'}`}>
                                                <Edit3 size={14} className=&quot;md:w-4 md:h-4&quot; /> Editeur
                                            </button>
                                        )}
                                    </div>
                                    <button onClick={() => editMode ? handleAdminLock() : setShowAdminInput(v => !v)} className={`p-2 rounded-lg transition-colors ${editMode ? 'bg-yellow-100 text-yellow-700 hover:bg-yellow-200' : 'text-gray-400 hover:text-gray-600 hover:bg-gray-100'}`} title={editMode ? 'Quitter le mode édition' : 'Mode édition'}>
                                        {editMode ? <Unlock size={18} /> : <Lock size={18} />}
                                    </button>
                                </div>
                            </div>
                        </div>

                        {showAdminInput &amp;&amp; !editMode &amp;&amp; (
                            <div className=&quot;absolute right-4 top-16 bg-[#003057] text-white rounded-b-lg shadow-lg p-3 flex items-center gap-2 z-50&quot;>
                                <Lock size={16} className=&quot;text-yellow-400&quot; />
                                <input
                                    type=&quot;password&quot;
                                    value={adminPassword}
                                    onChange={(e) => { setAdminPassword(e.target.value); setAdminError(false); }}
                                    onKeyDown={(e) => { if (e.key === 'Enter') handleAdminUnlock(); }}
                                    placeholder=&quot;Mot de passe&quot;
                                    className=&quot;px-2 py-1 rounded text-gray-800 text-sm focus:outline-none&quot;
                                    autoFocus
                                />
                                <button onClick={handleAdminUnlock} className=&quot;bg-yellow-400 text-yellow-900 text-xs font-bold px-3 py-1 rounded hover:bg-yellow-300&quot;>
                                    Accéder
                                </button>
                                {adminError &amp;&amp; <span className=&quot;text-red-300 text-xs whitespace-nowrap&quot;>Mot de passe incorrect</span>}
                            </div>
                        )}
                    </nav>

                    {editMode &amp;&amp; (
                        <div className=&quot;bg-yellow-50 border-b border-yellow-200&quot;>
                            <div className=&quot;max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-2 flex flex-wrap items-center justify-between gap-2&quot;>
                                <span className=&quot;text-xs font-bold text-yellow-800&quot;>Mode édition activé — les modifications sont enregistrées dans ce navigateur</span>
                                <div className=&quot;flex items-center gap-2&quot;>
                                    <button onClick={handleExportData} className=&quot;flex items-center gap-1.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 px-3 py-1.5 rounded-lg transition-colors&quot;>
                                        <Download size={14} /> Exporter (JSON)
                                    </button>
                                    <button onClick={handleResetData} className=&quot;flex items-center gap-1.5 text-xs font-bold text-yellow-800 border border-yellow-300 hover:bg-yellow-100 px-3 py-1.5 rounded-lg transition-colors&quot;>
                                        <RotateCcw size={14} /> Réinitialiser
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <main className=&quot;flex-grow&quot;>
                        {currentView === 'roadmap' &amp;&amp; <ViewRoadmapEE roadmapProducts={data.roadmapProducts} />}
                        {currentView === 'os-smr' &amp;&amp; <ViewOSAndSMR rows={data.osSmrRows} />}
                        {currentView === 'comparison' &amp;&amp; <ViewComparison products={data.comparisonProducts} />}
                        {currentView === 'editor' &amp;&amp; editMode &amp;&amp; <SmtDataEditor data={data} setData={setData} />}
                    </main>

                    <footer className=&quot;bg-white border-t border-gray-200 mt-12 md:mt-20 pb-safe&quot;>
                        <div className=&quot;max-w-7xl mx-auto px-4 py-8 md:py-12&quot;>
                            <div className=&quot;flex flex-col md:flex-row justify-between items-start gap-4&quot;>
                                <div>
                                    <img src=&quot;Logo Black/Samsung_Orig_Wordmark_BLACK_CMYK.svg&quot; alt=&quot;Samsung&quot; className=&quot;h-5 w-auto&quot; />
                                    <p className=&quot;mt-2 text-xs md:text-sm text-gray-500 max-w-xs&quot;>Une sécurité de niveau défense pour protéger ce qui compte le plus.</p>
                                </div>
                            </div>
                            <div className=&quot;border-t border-gray-100 mt-6 pt-6&quot;>
                                <div className=&quot;text-[10px] md:text-xs text-gray-400 text-center md:text-left&quot;>© {new Date().getFullYear()} Samsung Electronics Co., Ltd. Les images sont simulées.</div>
                            </div>
                        </div>
                    </footer>
                </div>

        const monthNamesMap = {
            'janvier': 0, 'février': 1, 'mars': 2, 'avril': 3, 'mai': 4, 'juin': 5,
            'juillet': 6, 'août': 7, 'septembre': 8, 'octobre': 9, 'novembre': 10, 'décembre': 11
        };

        function parseDateToOffset(dateStr) {
            try {
                const parts = dateStr.toLowerCase().trim().split(' ');
                const monthStr = parts[0];
                const yearStr = parts[1];
                const month = monthNamesMap[monthStr] || 0;
                const year = parseInt(yearStr, 10) || new Date().getFullYear();
                return year * 12 + month;
            } catch (e) {
                return new Date().getFullYear() * 12;
            }
        }

        // --- INITIALISATION DE LA TIMELINE ---
        function renderTimeline() {
            const now = new Date();
            const currentDataOffset = (now.getFullYear() * 12) + now.getMonth();
            const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
            const currentDayFraction = now.getDate() / daysInMonth; 
            const currentAbsoluteOffset = currentDataOffset + currentDayFraction;

            const parsedProducts = roadmapData.map(product => ({
                ...product,
                startOffset: parseDateToOffset(product.startDate),
                endOffset: parseDateToOffset(product.endDate)
            }));

            if(parsedProducts.length === 0) return;

            let minOffset = Math.min(...parsedProducts.map(p => p.startOffset));
            let maxOffset = Math.max(...parsedProducts.map(p => p.endOffset));

            minOffset = Math.min(minOffset, currentDataOffset);
            maxOffset = Math.max(maxOffset, currentDataOffset);

            const chartMinOffset = Math.floor(minOffset / 3) * 3;
            const chartMaxOffset = (Math.floor(maxOffset / 3) * 3) + 2;
            const totalMonths = Math.max(3, chartMaxOffset - chartMinOffset + 1); 

            const quarters = [];
            const totalQuarters = totalMonths / 3;
            for (let i = 0; i < totalQuarters; i++) {
                const m = chartMinOffset + (i * 3);
                let monthNormalized = m % 12;

            const years = [];

        function setFilter(filterType, value) {
            const product = roadmapData.find(p => p.id === state.selectedProductId);
            if (!product) return;

            state.filters[filterType] = value;

            const currentVariantExists = product.variants.some(v => {
                return Object.keys(product.options).every(key => v[key] === state.filters[key]);
            });

            if (!currentVariantExists) {
                const fallbackVariant = product.variants.find(v => v[filterType] === value);
                if (fallbackVariant) {
                    Object.keys(product.options).forEach(key => {
                        state.filters[key] = fallbackVariant[key];
                    });
                }
            }

            updateFiltersUI(state.selectedProductId);
            updateResultsUI(state.selectedProductId);
        }

        function updateFiltersUI(productId) {
            const product = roadmapData.find(p => p.id === productId);
            if (!product) return;

            let html = '<div class=&quot;grid grid-cols-1 md:grid-cols-2 gap-5&quot;>';
            
            Object.entries(product.options).forEach(([filterKey, optionData]) => {
                const isFullWidth = filterKey === 'os';
                
                html += `
                    <div class=&quot;${isFullWidth ? 'md:col-span-2' : ''}&quot;>
                        <label class=&quot;flex items-center text-xs font-bold text-gray-500 uppercase tracking-wider mb-2&quot;>

                        </label>
                        <div class=&quot;flex flex-wrap gap-2&quot;>
                `;
                
                optionData.values.forEach(value => {
                    const isSelected = state.filters[filterKey] === value;
                    
                    const isAvailable = product.variants.some(v => {
                        return Object.keys(product.options).every(key => {
                            if (key === filterKey) return v[key] === value;
                            return v[key] === state.filters[key];
                        });
                    });

                    const baseClass = &quot;px-3 py-1.5 rounded-lg text-xs md:text-sm font-semibold transition-all&quot;;
                    let stateClass = &quot;&quot;;
                    
                    if (isSelected) {
                        stateClass = &quot;bg-blue-600 text-white shadow-md ring-2 ring-blue-600/30&quot;;
                    } else if (isAvailable) {
                        stateClass = &quot;bg-white border border-gray-200 text-gray-700 hover:border-blue-400 hover:bg-blue-50/50&quot;;
                    } else {
                        stateClass = &quot;bg-gray-100/50 border border-gray-200 border-dashed text-gray-400 opacity-60 hover:bg-gray-100 hover:opacity-100&quot;;
                    }
                    
                    const safeValue = value.replace(/&quot;/g, '&amp;quot;');

                    html += `
                        <button onclick=&quot;setFilter('${filterKey}', '${safeValue}')&quot; 
                                class=&quot;${baseClass} ${stateClass}&quot;>
                            ${value}
                        </button>
                    `;
                });

                html += `</div></div>`;
            });
            html += '</div>';

            const filtersContainer = document.getElementById(`filters-${productId}`);
            if (filtersContainer) {
                filtersContainer.innerHTML = html;
                lucide.createIcons({ root: filtersContainer });
            }
        }

        // --- LOGIQUE DU COMPARATEUR ---
        
        function getUniqueOptions() {
            const options = { screenSize: new Set(), processor: new Set(), ram: new Set(), rom: new Set(), cg: new Set(), os: new Set() };
            
            roadmapData.forEach(model => {
                model.variants.forEach(v => {
                    if (v.screenSize) options.screenSize.add(v.screenSize);
                    if (v.processor) options.processor.add(v.processor);
                    if (v.ram) options.ram.add(v.ram);
                    if (v.rom) options.rom.add(v.rom);
                    if (v.cg) options.cg.add(v.cg);
                    if (v.os) options.os.add(v.os);
                });
            });
            
            return {
                screenSize: Array.from(options.screenSize).sort(),
                processor: Array.from(options.processor).sort(),
                ram: Array.from(options.ram).sort(),
                rom: Array.from(options.rom).sort(),
                cg: Array.from(options.cg).sort(),
                os: Array.from(options.os).sort()
            };
        }

        function initComparator() {
            const uniqueOpts = getUniqueOptions();
            const filterConfigs = [
                { key: 'screenSize', label: &quot;Écran&quot;, icon: &quot;monitor&quot;, opts: uniqueOpts.screenSize },
                { key: 'processor', label: &quot;Processeur&quot;, icon: &quot;cpu&quot;, opts: uniqueOpts.processor },
                { key: 'ram', label: &quot;RAM&quot;, icon: &quot;memory-stick&quot;, opts: uniqueOpts.ram },
                { key: 'rom', label: &quot;Stockage&quot;, icon: &quot;hard-drive&quot;, opts: uniqueOpts.rom },

        function resetComparatorFilters() {
            ['screenSize', 'processor', 'ram', 'rom', 'cg', 'os'].forEach(key => {

                if (el) {
                    el.value = '';

        function applyComparatorFilters() {
            const filters = {
                screenSize: document.getElementById('comp-filter-screenSize')?.value || '',
                processor: document.getElementById('comp-filter-processor')?.value || '',
                ram: document.getElementById('comp-filter-ram')?.value || '',
                rom: document.getElementById('comp-filter-rom')?.value || '',
                cg: document.getElementById('comp-filter-cg')?.value || '',
                os: document.getElementById('comp-filter-os')?.value || ''
            };

            let results = [];

            roadmapData.forEach(model => {
                model.variants.forEach(variant => {
                    let match = true;
                    if (filters.screenSize &amp;&amp; variant.screenSize !== filters.screenSize) match = false;
                    if (filters.processor &amp;&amp; variant.processor !== filters.processor) match = false;
                    if (filters.ram &amp;&amp; variant.ram !== filters.ram) match = false;
                    if (filters.rom &amp;&amp; variant.rom !== filters.rom) match = false;
                    if (filters.os &amp;&amp; variant.os !== filters.os) match = false;
                    
                    if (filters.cg) {
                        if (!variant.cg || variant.cg !== filters.cg) match = false;
                    }

                    if (match) {
                        results.push({
                            modelName: model.name,
                            modelImage: model.image,
                            ...variant
                        });
                    }
                });
            });

            state.comparatorResults = results;
            renderComparatorResults();
        }

            { key: 'lcaDisp',        label: 'LCA fin de vie',      type: 'num', nullable: true },
        ];

        const EcoDataEditor = ({ data, setData }) => {
            const updateField = (idx, key, value, field) => {
                let v = value;
                if (field.type === 'num') {
                    if (value === '') {
                        v = field.nullable ? null : 0;
                    } else {
                        v = parseFloat(value);
                        if (isNaN(v)) v = field.nullable ? null : 0;
                    }
                }
                setData(prev => prev.map((row, i) => i === idx ? { ...row, [key]: v } : row));
            };

            const addRow = () => {
                const blank = {};
                ECO_FIELDS.forEach(f => { blank[f.key] = f.type === 'num' ? (f.nullable ? null : 0) : ''; });
                setData(prev => [...prev, blank]);
            };

            const removeRow = (idx) => {
                if (!window.confirm('Supprimer cette ligne ?')) return;
                setData(prev => prev.filter((_, i) => i !== idx));
            };

            const inputCls = &quot;w-full min-w-[90px] px-2 py-1.5 text-sm border border-gray-200 rounded-lg outline-none focus:border-blue-500 bg-white&quot;;

            return (

                                    ))}
                                    <th className=&quot;px-2 py-2&quot;></th>
                                </tr>
                            </thead>
                            <tbody>
                                {data.map((row, idx) => (
                                    <tr key={idx} className=&quot;border-t border-gray-100&quot;>
                                        {ECO_FIELDS.map(f => (
                                            <td key={f.key} className=&quot;px-2 py-1.5&quot;>
                                                <input
                                                    type={f.type === 'num' ? 'number' : 'text'}
                                                    className={inputCls}
                                                    value={row[f.key] === null || row[f.key] === undefined ? '' : row[f.key]}

                    setEditMode(true); setShowAdminInput(false);

                } else { setAdminError(true); }
            };

            const handleAdminLock = () => {
                setEditMode(false); setEditorView(false);
                setShowAdminInput(false); setAdminPassword(''); setAdminError(false);
            };

            const handleResetData = () => {
                if (!window.confirm(&quot;Reinitialiser toutes les modifications et revenir aux donnees d'origine ?&quot;)) return;
                setData(JSON.parse(JSON.stringify(rawData)));
            };

            const handleExportData = () => {
                const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url; a.download = 'ecodesign-data.json';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                URL.revokeObjectURL(url);
            };

            return (
                <div className=&quot;min-h-screen bg-gray-50 font-sans text-gray-900 pb-20 selection:bg-blue-100&quot;>
                    <nav className=&quot;sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all&quot;>
                        <div className=&quot;max-w-6xl mx-auto px-6 h-16 flex items-center justify-between&quot;>
                            <div className=&quot;font-bold text-xl tracking-tight flex items-center gap-2&quot;>
                                SAMSUNG <span className=&quot;w-px h-4 bg-gray-300 mx-1&quot;></span> <span className=&quot;font-normal text-gray-500 text-sm uppercase tracking-wider&quot;>Eco-Dashboard</span>
                            </div>
                            <div className=&quot;flex items-center gap-6&quot;>
                                <div className=&quot;hidden md:flex gap-8 text-sm font-bold text-gray-500&quot;>
                                    <a
                                        href=&quot;https://eprel.ec.europa.eu/screen/product/smartphonestablets20231669&quot;
                                        target=&quot;_blank&quot;
                                        rel=&quot;noopener noreferrer&quot;
                                        className=&quot;hover:text-blue-600 transition-colors py-2 relative group flex items-center gap-2&quot;
                                    >
                                        Site EPREL
                                        <ExternalLink size={14} />
                                        <span className=&quot;absolute bottom-0 left-0 w-0 h-0.5 bg-blue-600 transition-all group-hover:w-full&quot;></span>
                                    </a>
                                </div>
                                {!editMode ? (
                                    <button
                                        onClick={() => { setShowAdminInput(s => !s); setAdminError(false); setAdminPassword(''); }}
                                        className=&quot;p-2.5 rounded-lg border border-gray-200 text-gray-400 hover:text-gray-600 hover:border-gray-300 transition-colors&quot;
                                        title=&quot;Mode Edition&quot;
                                    >
                                        <Lock size={16} />
                                    </button>
                                ) : (
                                    <button
                                        onClick={handleAdminLock}
                                        className=&quot;p-2.5 rounded-lg border border-green-200 bg-green-50 text-green-600 hover:bg-green-100 transition-colors&quot;
                                        title=&quot;Quitter le mode edition&quot;
                                    >
                                        <Unlock size={16} />
                                    </button>
                                )}
                            </div>
                        </div>

                        {/* Barre mot de passe Admin */}
                        {showAdminInput &amp;&amp; !editMode &amp;&amp; (
                            <div className=&quot;bg-gray-900 px-4 py-3 flex items-center gap-3&quot;>
                                <Lock size={16} className=&quot;text-yellow-400 flex-shrink-0&quot; />
                                <span className=&quot;text-xs text-gray-300 font-medium whitespace-nowrap&quot;>Mode Edition</span>
                                <input
                                    type=&quot;password&quot;
                                    value={adminPassword}
                                    onChange={e => { setAdminPassword(e.target.value); setAdminError(false); }}
                                    onKeyDown={e => e.key === 'Enter' &amp;&amp; handleAdminUnlock()}
                                    placeholder=&quot;Mot de passe&quot;
                                    autoFocus
                                    className={`flex-1 max-w-xs bg-gray-800 text-white text-xs px-3 py-1.5 rounded-lg border outline-none focus:border-blue-500 ${adminError ? 'border-red-500' : 'border-gray-700'}`}
                                />
                                <button
                                    onClick={handleAdminUnlock}
                                    className=&quot;px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors whitespace-nowrap&quot;
                                >Acceder</button>
                                {adminError &amp;&amp; <span className=&quot;text-xs text-red-400 whitespace-nowrap&quot;>Mot de passe incorrect</span>}
                            </div>
                        )}

                        {/* Bandeau mode edition actif */}
                        {editMode &amp;&amp; (
                            <div className=&quot;bg-yellow-50 border-y border-yellow-200 px-4 py-2 flex flex-wrap items-center gap-2&quot;>
                                <Leaf size={14} className=&quot;text-yellow-500&quot; />
                                <span className=&quot;text-xs font-semibold text-yellow-700&quot;>Mode Edition actif</span>
                                <div className=&quot;flex bg-white rounded-lg border border-yellow-200 p-0.5 ml-2&quot;>
                                    <button
                                        onClick={() => setEditorView(false)}
                                        className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${!editorView ? 'bg-yellow-500 text-white' : 'text-gray-500'}`}
                                    >Vue Dashboard</button>
                                    <button
                                        onClick={() => setEditorView(true)}
                                        className={`px-3 py-1 rounded-md text-xs font-medium transition-colors ${editorView ? 'bg-yellow-500 text-white' : 'text-gray-500'}`}
                                    >Editeur</button>
                                </div>
                                <div className=&quot;ml-auto flex items-center gap-2&quot;>
                                    <button
                                        onClick={handleExportData}
                                        className=&quot;inline-flex items-center gap-1.5 px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-medium rounded-lg transition-colors&quot;
                                    ><Download size={14} />Exporter (JSON)</button>
                                    <button
                                        onClick={handleResetData}
                                        className=&quot;inline-flex items-center gap-1.5 px-3 py-1.5 border border-gray-200 hover:bg-gray-50 text-gray-600 text-xs font-medium rounded-lg transition-colors&quot;
                                    ><RotateCcw size={14} />Reinitialiser</button>
                                </div>
                            </div>
                        )}
                    </nav>

                    <Hero />

                    <main className=&quot;max-w-6xl mx-auto px-6&quot;>
                        {editMode &amp;&amp; editorView ? (
                            <EcoDataEditor data={data} setData={setData} />
                        ) : (
                            <React.Fragment>
                                <MaterialsSection data={data} />
                                <LCASection data={data} />
                            </React.Fragment>
                        )}
                    </main>

                    <footer className=&quot;border-t border-gray-200 mt-20 pt-12 pb-12 bg-white&quot;>
                        <div className=&quot;max-w-6xl mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-6&quot;>
                            <div className=&quot;text-gray-400 text-sm text-center md:text-left&quot;>
                                <p className=&quot;font-semibold text-gray-900 mb-1&quot;>Samsung Electronics France</p>
                                <p>Données issues du rapport RSE. Valeurs indicatives.</p>
                            </div>
                            <div className=&quot;flex gap-4&quot;>
                                <div className=&quot;w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-black hover:text-white transition-colors cursor-pointer&quot;><Leaf size={14}/></div>
                                <div className=&quot;w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 hover:bg-black hover:text-white transition-colors cursor-pointer&quot;><Recycle size={14}/></div>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        };
        window.addEventListener('message', function(e){ if(e.data &amp;&amp; e.data.samsungNav){ var el=document.getElementById(e.data.samsungNav); if(el) setTimeout(function(){ el.scrollIntoView({behavior:'smooth'}); },150); } });
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>"></iframe>
  </div>

  <script>
    var currentSection = 'roadmap';

    // Toggle group open/close and switch to that section
    function toggleGroup(id, headerEl) {
      var group = document.getElementById('group-' + id);
      var isOpen = group.classList.contains('open');
      // If clicking a different section, open it and show its frame
      if (currentSection !== id) {
        // Close current group
        document.getElementById('group-' + currentSection).classList.remove('open');
        document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
        // Open new group
        group.classList.add('open');
        headerEl.classList.add('active');
        showFrame(id);
        // Activate first sub-item
        var firstSub = group.querySelector('.sub-item');
        document.querySelectorAll('.sub-item').forEach(function(s){ s.classList.remove('active'); });
        if (firstSub) firstSub.classList.add('active');
        currentSection = id;
      } else {
        // Same section: toggle open/close
        group.classList.toggle('open');
        headerEl.classList.toggle('active', group.classList.contains('open'));
      }
    }

    function showFrame(id) {
      document.querySelectorAll('.section-frame').forEach(function(f){ f.classList.remove('active'); });
      var frame = document.getElementById('frame-' + id);
      if (frame) frame.classList.add('active');
    }

    // Navigate to sub-section inside an iframe via postMessage
    function navigate(section, view, subEl) {
      // Switch section if needed
      if (currentSection !== section) {
        document.getElementById('group-' + currentSection).classList.remove('open');
        document.querySelectorAll('.nav-item').forEach(function(n){ n.classList.remove('active'); });
        var group = document.getElementById('group-' + section);
        group.classList.add('open');
        var header = group.querySelector('.nav-item');
        if (header) header.classList.add('active');
        showFrame(section);
        currentSection = section;
      }
      // Highlight sub-item
      document.querySelectorAll('.sub-item').forEach(function(s){ s.classList.remove('active'); });
      if (subEl) subEl.classList.add('active');
      // Send message to iframe
      var frame = document.getElementById('frame-' + section);
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage({ samsungNav: view }, '*');
      }
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
    }
  </script>

</body>
